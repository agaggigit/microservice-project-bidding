name: Build and Push to Docker Hub

# Pipeline ini menyala saat ada push/merge ke branch main
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      # 1. Login ke Docker Hub menggunakan rahasia dari GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      # 2. Build image dan langsung Push ke Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: danidaivaz/microservice-project-bidding:latest
